# CUDA-specific config overrides. Loaded on top of the root config.conf via
# CONFIG_EXTRA=cuda/cuda_overrides.conf. Values here win on any conflict.
#
# These do NOT change the mathematical results vs the MPS runs:
#   UseAMP:          FP16 mixed precision via autocast + GradScaler. Tensor
#                    Cores give ~2x conv throughput on Turing (RTX 6000).
#                    Numerically near-identical to FP32; not expected to affect
#                    convergence stats at the seed granularity we use.
#   CudnnBenchmark:  Lets cuDNN auto-select the fastest conv algorithm for the
#                    fixed 84x84x4 input. One-time cost at startup; free thereafter.
#
# Hyperparameters (NumEnv, NumStep, etc.) are intentionally left at their
# per-experiment defaults so results stay comparable to the M1 runs.

[DEFAULT]
UseGPU = True
UseAMP = True
CudnnBenchmark = True
