# ---------- Experiment 4: Posterior sampling (with and without stacking) ----------
# Tests Bootstrap DQN-style posterior sampling on the K=5 extrinsic critic
# ensemble. Each rollout commits to one randomly-sampled value head per env
# worker, providing trajectory-level exploration coherence. Hypothesis: this
# addresses the "deep exploration" gap that per-step curiosity signals leave
# open.
#
# Compares against vanilla RND (exp3_keycorridor_baseline) for posterior-alone
# effect, and against NovelD / SimHash for stacking marginal contribution.

[EXP4_KEYCORRIDOR_POSTERIOR]
EnvType = minigrid
EnvID = MiniGrid-KeyCorridorS3R1-v0
MaxStepPerEpisode = 200
NumEnv = 8
UseInventory = True
TVOn = True
UsePosteriorSampling = True
NumExtCritics = 5
TotalSteps = 1500000

