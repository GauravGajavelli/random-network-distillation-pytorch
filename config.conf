[DEFAULT]
TrainMethod = RND

EnvType = atari
EnvID = MontezumaRevengeNoFrameskip-v4
MaxStepPerEpisode = 4500
ExtCoef = 2.

LearningRate = 1e-4
NumEnv = 8
NumStep = 128
Gamma = 0.999
IntGamma = 0.99
Lambda = 0.95
StableEps = 1e-8
StateStackSize = 4
PreProcHeight = 84
ProProcWidth = 84
UseGAE = True
UseGPU = True
UseNorm = False
UseNoisyNet = False
ClipGradNorm = 0.5
Entropy = 0.001
Epoch = 4
MiniBatch = 4
PPOEps = 0.1
IntCoef = 1.
StickyAction = False
ActionProb = 0.0
UpdateProportion = 0.25
LifeDone = False
ObsNormStep = 10
LoadModel = False
TotalSteps = 1000000

# Reproducibility
Seed = 0

# Option B (foundational bootstrap-ensemble extrinsic critic + intrinsic gate)
UseOptionB = False
NumExtCritics = 5
BootstrapP = 0.8
GateAlpha = 0.5
# Floor on the gate so intrinsic reward is never fully suppressed (preserves
# RND's exploration property on sparse-reward tasks where extrinsic critic
# variance is low everywhere uniformly).
GateFloor = 0.2

# DSC (Discriminative Subgoal Curiosity)
UseDSC = False
NumAnchors = 64
AnchorPercentile = 0.9
DSCLambda = 0.5
RankBeta = 0.5
# Type-learning extension: K-means clustering over the anchor buffer.
# When UseClusters=True, the DSC bonus uses nearest-cluster (out of K=NumClusters)
# instead of nearest-anchor (out of NumAnchors). Cluster centers get refreshed
# every ClusterRefreshSteps env steps.
UseClusters = False
NumClusters = 8
ClusterRefreshSteps = 4096

# NovelD (Zhang et al. 2021): RND difference form max(RND(s')-α*RND(s), 0)
# multiplied by an episodic visit-count factor 1/sqrt(N(key(s'))). Resets
# the visit counter on episode boundaries. Targets weaknesses #1, #4, #12
# and "dancing with skulls" by suppressing reward in already-visited states
# and rewarding frontier-pushing.
UseNovelD = False
NovelDAlpha = 0.5
# Type-learning variant: count visits to K-means cluster IDs over RND target
# features instead of discrete position keys. Tests whether feature-level
# state abstraction improves sample efficiency over coordinate-level keys.
UseNovelDClusters = False
NovelDNumClusters = 8
NovelDBufferSize = 256

# SimHash (Tang et al. 2017): random-projection-based pseudo-count.
# r_int = RND_signal + SimHashLambda * (1/sqrt(N(hash(s)))). Additive
# combination preserves RND's signal in well-explored regions while adding
# a complementary episodic-style novelty signal in poorly-explored ones.
UseSimHash = False
SimHashLambda = 0.5
SimHashDim = 64

# Posterior sampling (Osband et al. 2016 / Bootstrap DQN). Uses K extrinsic
# critics for per-rollout exploration diversification rather than pessimism:
# each env worker is assigned an active head index that gets used for the
# extrinsic-value bootstrap throughout the rollout. Heads are resampled at
# the end of each rollout. This provides "deep exploration" — episode-length
# commitment to one value model — without suppressing RND. Requires K>1
# (uses NumExtCritics). Set UseOptionB=False if using posterior sampling
# (mutually exclusive: both consume the K-critic ensemble).
UsePosteriorSampling = False

# MiniGrid wrapper toggles
TVOn = False
TVMaxSize = 9
PMove = 1.0
UseInventory = False
TileSize = 8
# Negative reward on lava-death (and other zero-reward terminations).
# Default 0 keeps the original MiniGrid behaviour. Set to -1.0 to convert
# LavaCrossing into a true Pitfall analog where intrinsic curiosity competes
# against extrinsic penalty.
LavaPenalty = 0.0

[OPTIONS]
EnvType = [atari, mario, minigrid]

# Atari section retained for migration sanity check
[ATARI_MONTEZUMA]
EnvType = atari
EnvID = MontezumaRevengeNoFrameskip-v4
