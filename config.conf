[DEFAULT]
TrainMethod = RND

EnvType = atari
EnvID = MontezumaRevengeNoFrameskip-v4
MaxStepPerEpisode = 4500
ExtCoef = 2.

LearningRate = 1e-4
NumEnv = 8
NumStep = 128
Gamma = 0.999
IntGamma = 0.99
Lambda = 0.95
StableEps = 1e-8
StateStackSize = 4
PreProcHeight = 84
ProProcWidth = 84
UseGAE = True
UseGPU = True
UseNorm = False
UseNoisyNet = False
ClipGradNorm = 0.5
Entropy = 0.001
Epoch = 4
MiniBatch = 4
PPOEps = 0.1
IntCoef = 1.
StickyAction = False
ActionProb = 0.0
UpdateProportion = 0.25
LifeDone = False
ObsNormStep = 10
LoadModel = False
TotalSteps = 1000000

# Option B (foundational bootstrap-ensemble extrinsic critic + intrinsic gate)
UseOptionB = False
NumExtCritics = 5
BootstrapP = 0.8
GateAlpha = 1.0

# DSC (Discriminative Subgoal Curiosity)
UseDSC = False
NumAnchors = 64
AnchorPercentile = 0.9
DSCLambda = 0.5
RankBeta = 0.5
# Type-learning extension: K-means clustering over the anchor buffer.
# When UseClusters=True, the DSC bonus uses nearest-cluster (out of K=NumClusters)
# instead of nearest-anchor (out of NumAnchors). Cluster centers get refreshed
# every ClusterRefreshSteps env steps.
UseClusters = False
NumClusters = 8
ClusterRefreshSteps = 4096

# MiniGrid wrapper toggles
TVOn = False
TVMaxSize = 9
PMove = 1.0
UseInventory = False
TileSize = 8

[OPTIONS]
EnvType = [atari, mario, minigrid]

